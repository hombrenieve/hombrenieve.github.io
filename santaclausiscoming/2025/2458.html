	<!-- Custom Recycling Animation Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const container = document.querySelector('.recycling-container');
			const trashEmojis = document.querySelectorAll('.trash-emoji');
			
			// Add hover effect to container
			container.addEventListener('mouseenter', function() {
				this.style.transform = 'scale(1.02)';
				this.style.transition = 'transform 0.3s ease';
			});
			
			container.addEventListener('mouseleave', function() {
				this.style.transform = 'scale(1)';
			});
			
			// Add click effect to recycle icon
			const recycleIcon = document.querySelector('.recycle-icon');
			recycleIcon.addEventListener('click', function() {
				// Speed up rotation temporarily
				this.style.animation = 'spin 0.5s linear infinite';
				setTimeout(() => {
					this.style.animation = 'spin 3s linear infinite';
				}, 2000);
			});
			
			// Add random bounce delays to trash emojis
			trashEmojis.forEach((emoji, index) => {
				emoji.style.animationDelay = (index * 0.3) + 's';
			});
		});
	</script>
