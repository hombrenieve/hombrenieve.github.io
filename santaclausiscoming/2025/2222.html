	<!-- Custom Audio Script -->
	<script>
		const audio = document.getElementById('clueAudio');
		
		// Auto-play when page loads (with user interaction fallback)
		window.addEventListener('load', function() {
			// Try to autoplay, but browsers may block this
			audio.play().catch(function(error) {
				console.log('Autoplay was prevented. User interaction required.');
			});
		});
		
		function playAudio() {
			audio.play();
		}
		
		function pauseAudio() {
			audio.pause();
		}
		
		function restartAudio() {
			audio.currentTime = 0;
			audio.play();
		}
		
		// Add visual feedback when audio is playing
		audio.addEventListener('play', function() {
			document.querySelector('.audio-container').style.border = '3px solid #d4af37';
		});
		
		audio.addEventListener('pause', function() {
			document.querySelector('.audio-container').style.border = 'none';
		});
		
		audio.addEventListener('ended', function() {
			document.querySelector('.audio-container').style.border = 'none';
		});
	</script>
