		}
		
		.fire-emoji {
			font-size: 2.5em;
			animation: flicker 1.5s infinite alternate;
			margin: 0 10px;
		}
		
		@keyframes flicker {
			0% {
				transform: scale(1) rotate(-2deg);
				filter: hue-rotate(0deg);
			}
			50% {
				transform: scale(1.1) rotate(2deg);
				filter: hue-rotate(10deg);
			}
			100% {
				transform: scale(1.05) rotate(-1deg);
				filter: hue-rotate(-5deg);
			}
		}
		
		.sizzle-text {
			color: #FF4500;
			font-weight: bold;

		}

	<!-- Custom Cooking Animation Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const container = document.querySelector('.cooking-container');
			const fileteImage = document.querySelector('.filete-image');
			
			// Add hover effect to container
			container.addEventListener('mouseenter', function() {
				this.style.transform = 'scale(1.02)';
				this.style.transition = 'transform 0.3s ease';
			});
			
			container.addEventListener('mouseleave', function() {
				this.style.transform = 'scale(1)';
			});
			
			// Add sizzling effect on image click
			fileteImage.addEventListener('click', function() {
				// Create temporary sizzle effect
				const sizzleText = document.createElement('div');
				sizzleText.innerHTML = '🔥 ¡SIZZLE! 🔥';
				sizzleText.style.position = 'absolute';
				sizzleText.style.fontSize = '1.5em';
				sizzleText.style.color = '#FF4500';
				sizzleText.style.fontWeight = 'bold';
				sizzleText.style.animation = 'fadeOut 2s forwards';
				sizzleText.style.pointerEvents = 'none';
				
				this.parentNode.style.position = 'relative';
				this.parentNode.appendChild(sizzleText);
				
				// Remove after animation
				setTimeout(() => {
					if (sizzleText.parentNode) {
						sizzleText.parentNode.removeChild(sizzleText);
					}
				}, 2000);
			});
			
			// Add CSS for fadeOut animation
			const style = document.createElement('style');
			style.textContent = `
				@keyframes fadeOut {
					0% { opacity: 1; transform: translateY(0); }
					100% { opacity: 0; transform: translateY(-30px); }
				}
			`;
			document.head.appendChild(style);
		});
	</script>
