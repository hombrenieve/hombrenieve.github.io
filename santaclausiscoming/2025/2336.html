	<!-- Custom Balloon Animation Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const container = document.querySelector('.balloon-container');
			const balloonItems = document.querySelectorAll('.balloon-item');
			
			// Add hover effect to container
			container.addEventListener('mouseenter', function() {
				this.style.transform = 'scale(1.02)';
				this.style.transition = 'transform 0.3s ease';
			});
			
			container.addEventListener('mouseleave', function() {
				this.style.transform = 'scale(1)';
			});
			
			// Add click effect to balloon items (simulate popping)
			balloonItems.forEach((balloon, index) => {
				balloon.addEventListener('click', function() {
					// Create pop effect
					this.style.animation = 'none';
					this.innerHTML = '💥';
					this.style.transform = 'scale(1.5)';
					this.style.color = '#FF6B6B';
					
					// Reset after 1 second
					setTimeout(() => {
						this.innerHTML = '🎈';
						this.style.transform = 'scale(1)';
						this.style.color = 'initial';
						this.style.animation = `float 2s ease-in-out infinite`;
						this.style.animationDelay = (index * 0.5) + 's';
					}, 1000);
				});
			});
			
			// Add random color variations to balloons
			const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'];
			balloonItems.forEach((balloon, index) => {
				balloon.style.filter = `hue-rotate(${index * 60}deg)`;
			});
		});
	</script>
