	<style>
		body {
			background: linear-gradient(135deg, #0f0f23 0%, #1a1a3a 25%, #2d2d5f 50%, #1a1a3a 75%, #0f0f23 100%);
			background-attachment: fixed;
		}
		
		.celestial-container {
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 248, 255, 0.95));
			border-radius: 25px;
			padding: 45px;
			margin: 20px 0;
			box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
			text-align: center;
			border: 3px solid #d4af37;
			position: relative;
			overflow: hidden;
		}
		
		.celestial-container::before {
			content: '';
			position: absolute;
			top: -50%;
			left: -50%;
			width: 200%;
			height: 200%;
			background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
			animation: rotate 20s linear infinite;
			pointer-events: none;
		}
		
		@keyframes rotate {
			from {
				transform: rotate(0deg);
			}
			to {
				transform: rotate(360deg);
			}
		}
		
		.elevation-emoji {
			font-size: 4em;
			animation: elevate 3s ease-in-out infinite;
			margin: 20px 0;
			text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
		}
		
		@keyframes elevate {
			0%, 100% {
				transform: translateY(0px);
			}
			50% {
				transform: translateY(-25px);
			}
		}
		
		.verse-text {
			font-size: 1.9em;
			color: #2c3e50;
			font-weight: bold;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
			margin: 25px 0;
			line-height: 1.5;
			font-style: italic;
			position: relative;
			z-index: 2;
		}
		
		.verse-line {
			margin: 20px 0;
			padding: 18px;
			background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(255, 215, 0, 0.05));
			border-radius: 15px;
			border-left: 5px solid #d4af37;
			position: relative;
		}
		
		.reflection-emoji {
			font-size: 2.5em;
			animation: reflect 2s ease-in-out infinite alternate;
			margin: 0 10px;
			display: inline-block;
		}
		
		@keyframes reflect {
			0% {
				transform: scaleY(1);
				opacity: 1;
			}
			100% {
				transform: scaleY(-1);
				opacity: 0.7;
			}
		}
		
		.crystal-emoji {
			font-size: 2.8em;
			animation: sparkle 1.5s ease-in-out infinite;
			margin: 0 10px;
			filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
		}
		
		@keyframes sparkle {
			0%, 100% {
				transform: scale(1) rotate(0deg);
				filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
			}
			50% {
				transform: scale(1.1) rotate(180deg);
				filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1));
			}
		}
		
		.star-curtain {
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			gap: 15px;
			margin: 30px 0;
			padding: 20px;
			background: linear-gradient(135deg, rgba(0, 0, 50, 0.1), rgba(25, 25, 112, 0.1));
			border-radius: 20px;
			border: 2px solid #4169E1;
		}
		
		.star-item {
			font-size: 3em;
			animation: twinkle 2s ease-in-out infinite;
			cursor: pointer;
			transition: transform 0.3s ease;
		}
		
		.star-item:nth-child(1) { animation-delay: 0s; }
		.star-item:nth-child(2) { animation-delay: 0.3s; }
		.star-item:nth-child(3) { animation-delay: 0.6s; }
		.star-item:nth-child(4) { animation-delay: 0.9s; }
		.star-item:nth-child(5) { animation-delay: 1.2s; }
		.star-item:nth-child(6) { animation-delay: 1.5s; }
		
		@keyframes twinkle {
			0%, 100% {
				opacity: 0.6;
				transform: scale(1);
			}
			50% {
				opacity: 1;
				transform: scale(1.2);
			}
		}
		
		.star-item:hover {
			transform: scale(1.4);
			filter: drop-shadow(0 0 15px rgba(255, 215, 0, 1));
		}
		
		.golden-threads {
			background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(218, 165, 32, 0.1));
			border-radius: 20px;
			padding: 30px;
			margin: 30px 0;
			border: 3px solid #DAA520;
			position: relative;
		}
		
		.golden-threads::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: repeating-linear-gradient(
				45deg,
				transparent,
				transparent 10px,
				rgba(255, 215, 0, 0.1) 10px,
				rgba(255, 215, 0, 0.1) 20px
			);
			border-radius: 17px;
			pointer-events: none;
		}
		
		.treasure-hint {
			background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(255, 215, 0, 0.1));
			border: 3px solid #d4af37;
			border-radius: 20px;
			padding: 30px;
			margin: 35px 0;
			color: #8B4513;
			font-size: 1.2em;
			position: relative;
			z-index: 2;
		}
		
		.golden-sparkle {
			color: #FFD700;
			font-size: 2em;
			animation: goldenTwinkle 1.8s infinite;
			margin: 0 8px;
		}
		
		@keyframes goldenTwinkle {
			0%, 100% { 
				opacity: 0.7; 
				transform: scale(1) rotate(0deg);
			}
			50% { 
				opacity: 1; 
				transform: scale(1.3) rotate(180deg);
			}
		}
		
		.elevation-path {
			display: flex;
			justify-content: center;
			align-items: center;
			margin: 25px 0;
			gap: 10px;
		}
		
		.path-step {
			font-size: 2em;
			animation: stepUp 3s ease-in-out infinite;
		}
		
		.path-step:nth-child(1) { animation-delay: 0s; }
		.path-step:nth-child(2) { animation-delay: 0.5s; }
		.path-step:nth-child(3) { animation-delay: 1s; }
		.path-step:nth-child(4) { animation-delay: 1.5s; }
		.path-step:nth-child(5) { animation-delay: 2s; }
		
		@keyframes stepUp {
			0%, 80%, 100% {
				transform: translateY(0);
				opacity: 0.6;
			}
			40% {
				transform: translateY(-15px);
				opacity: 1;
			}
		}
	</style>

	<!-- Celestial Animation Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const container = document.querySelector('.celestial-container');
			const starItems = document.querySelectorAll('.star-item');
			
			// Add hover effect to container
			container.addEventListener('mouseenter', function() {
				this.style.transform = 'scale(1.02)';
				this.style.transition = 'transform 0.3s ease';
			});
			
			container.addEventListener('mouseleave', function() {
				this.style.transform = 'scale(1)';
			});
			
			// Add click effect to star items
			starItems.forEach((star, index) => {
				star.addEventListener('click', function() {
					// Create sparkle burst effect
					this.style.animation = 'none';
					this.style.transform = 'scale(1.8) rotate(720deg)';
					this.style.filter = 'drop-shadow(0 0 25px rgba(255, 215, 0, 1))';
					
					// Create temporary sparkles around the star
					for (let i = 0; i < 5; i++) {
						const sparkle = document.createElement('span');
						sparkle.innerHTML = '✨';
						sparkle.style.position = 'absolute';
						sparkle.style.fontSize = '1.5em';
						sparkle.style.pointerEvents = 'none';
						sparkle.style.animation = 'sparkleOut 1.5s ease-out forwards';
						
						// Random position around the star
						const angle = (i * 72) * Math.PI / 180; // 72 degrees apart
						const distance = 50;
						sparkle.style.left = (Math.cos(angle) * distance) + 'px';
						sparkle.style.top = (Math.sin(angle) * distance) + 'px';
						
						this.parentNode.style.position = 'relative';
						this.parentNode.appendChild(sparkle);
						
						// Remove sparkle after animation
						setTimeout(() => {
							if (sparkle.parentNode) {
								sparkle.parentNode.removeChild(sparkle);
							}
						}, 1500);
					}
					
					// Reset star after effect
					setTimeout(() => {
						this.style.transform = 'scale(1) rotate(0deg)';
						this.style.filter = 'none';
						this.style.animation = `twinkle 2s ease-in-out infinite`;
						this.style.animationDelay = (index * 0.3) + 's';
					}, 1500);
				});
			});
			
			// Add CSS for sparkle out animation
			const style = document.createElement('style');
			style.textContent = `
				@keyframes sparkleOut {
					0% {
						opacity: 1;
						transform: scale(0) rotate(0deg);
					}
					50% {
						opacity: 1;
						transform: scale(1.2) rotate(180deg);
					}
					100% {
						opacity: 0;
						transform: scale(0.5) rotate(360deg);
					}
				}
			`;
			document.head.appendChild(style);
			
			// Add floating sparkles effect
			function createFloatingSparkle() {
				const sparkle = document.createElement('div');
				sparkle.innerHTML = ['✨', '⭐', '🌟', '💫'][Math.floor(Math.random() * 4)];
				sparkle.style.position = 'absolute';
				sparkle.style.fontSize = '1.2em';
				sparkle.style.pointerEvents = 'none';
				sparkle.style.opacity = '0.7';
				sparkle.style.animation = 'floatUp 4s ease-out forwards';
				
				// Random horizontal position
				sparkle.style.left = Math.random() * 100 + '%';
				sparkle.style.top = '100%';
				
				container.appendChild(sparkle);
				
				// Remove after animation
				setTimeout(() => {
					if (sparkle.parentNode) {
						sparkle.parentNode.removeChild(sparkle);
					}
				}, 4000);
			}
			
			// Add floating sparkles CSS
			const floatStyle = document.createElement('style');
			floatStyle.textContent = `
				@keyframes floatUp {
					0% {
						transform: translateY(0) rotate(0deg);
						opacity: 0.7;
					}
					50% {
						opacity: 1;
					}
					100% {
						transform: translateY(-200px) rotate(360deg);
						opacity: 0;
					}
				}
			`;
			document.head.appendChild(floatStyle);
			
			// Create floating sparkles periodically
			setInterval(createFloatingSparkle, 2000);
		});
	</script>
